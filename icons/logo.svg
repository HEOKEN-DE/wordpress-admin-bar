<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  <!-- WordPress "W" stylized -->
  <text x="64" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="42" fill="#ffffff">W</text>
  <!-- Admin bar line -->
  <rect x="24" y="76" width="80" height="6" rx="3" fill="#f48120"/>
  <!-- Three dots representing menu -->
  <circle cx="40" cy="96" r="4" fill="#f48120" opacity="0.7"/>
  <circle cx="64" cy="96" r="4" fill="#f48120" opacity="0.5"/>
  <circle cx="88" cy="96" r="4" fill="#f48120" opacity="0.3"/>
